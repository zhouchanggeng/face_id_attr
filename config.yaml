# 人脸识别流水线配置文件
# 每个模块通过 class 指定 "模块路径.类名"，params 传入构造函数参数
# 切换算法只需修改 class 和 params，无需改代码

# detector:
#   class: "module.face_detection.yolo_detector.YOLOFaceDetector"
#   params:
#     model_path: "models/yolo26m_wider_face/weights/best.pt"
#     conf_threshold: 0.5
#     iou_threshold: 0.45
#     imgsz: 640
#     device: "cuda:0"

# 可选检测器: YOLO ONNX（不依赖 PyTorch，适合部署）
detector:
  class: "module.face_detection.yolo_detector.YOLOFaceDetector"
  params:
    model_path: "models/yolo26m_wider_face/weights/yolo26m_facedetect_widerface.onnx"
    conf_threshold: 0.5
    iou_threshold: 0.45
    imgsz: 640

# 可选检测器: YuNet（轻量级，带 5 点 landmarks，配合 SFace alignCrop 效果好）
# detector:
#   class: "module.face_detection.yunet_detector.YuNetDetector"
#   params:
#     model_path: "models/yunet/face_detection_yunet_2023mar.onnx"
#     conf_threshold: 0.5

# 人脸校正 - 使用 PFLD_GhostOne 98 点关键点对齐
aligner:
  class: "module.face_alignment.pfld_aligner.PFLDAligner"
  params:
    model_path: "models/PFLD_GhostOne_112_1_opt_sim.onnx"
    input_size: 112
    output_size: [112, 112]

# 人脸识别 - 使用 ArcFace (512维特征)
recognizer:
  class: "module.face_recognition.arcface_recognizer.ArcFaceRecognizer"
  params:
    model_path: "models/arcface/glint360k_r50.onnx"

# 可选识别器: SFace (128维特征，轻量)
# recognizer:
#   class: "module.face_recognition.sface_recognizer.SFaceRecognizer"
#   params:
#     model_path: "models/sface/face_recognition_sface_2021dec.onnx"

# 人脸向量数据库（可替换为 FAISS/Milvus 等实现）
database:
  class: "module.face_database.numpy_db.NumpyFaceDatabase"
  params:
    dup_threshold: 0.9
  db_path: "face_db.npz"

# 人脸属性分析 - 微笑检测（复用 7 类表情模型，Happiness 映射为 Smile）
analyzer:
  class: "module.face_analysis.expression_analyzer.ExpressionAnalyzer"
  params:
    model_path: "models/expression/yolo26s_cls_rafdb.onnx"
    input_size: 224
    class_names: "rafdb_7"
    smile_mode: true
    smile_classes: ["Happiness"]  # 哪些表情类别算"微笑"

# 可选: 7 类表情识别（关闭 smile_mode）
# analyzer:
#   class: "module.face_analysis.expression_analyzer.ExpressionAnalyzer"
#   params:
#     model_path: "models/expression/yolo26s_cls_rafdb.onnx"
#     input_size: 224
#     class_names: "rafdb_7"
#     smile_mode: false

# 禁用属性分析:
# analyzer: null

# 人脸质量评估 - SER-FIQ（基于识别模型的特征稳定性评估，复用 ArcFace 模型）
quality_assessor:
  class: "module.face_quality.serfiq_assessor.SERFIQAssessor"
  params:
    model_path: "models/arcface/glint360k_r50.onnx"
    num_perturbations: 10
    input_size: 112

# 可选质量评估: 达摩院 FQA 模型
# quality_assessor:
#   class: "module.face_quality.fqa_assessor.FQAAssessor"
#   params:
#     model_path: "models/fqa_model.onnx"
#     input_size: 112

# 是否使用 SFace alignCrop 进行关键点对齐（需要 YuNet 检测器 + SFace 识别器）
use_align_crop: true

# 超大图缩放上限（长边像素），超过此值会先缩放再处理，避免裁剪缩放比过大导致特征质量下降
max_image_size: 1920

# 1:N 识别阈值
identify_threshold: 0.6

# ---- 人脸跟踪（视频模式） ----
# 可选: iou / sort / byte
tracker:
  type: "sort"
  params:
    iou_threshold: 0.3
    max_missed_sec: 0.5       # 连续未匹配秒数上限（自动乘以 fps 转为帧数）
    recognize_interval_sec: 1.0  # 重新识别间隔（秒）

# 可选跟踪器: IoU 贪心匹配（最轻量，适合简单场景）
# tracker:
#   type: "iou"
#   params:
#     iou_threshold: 0.3
#     max_missed_sec: 0.5
#     recognize_interval_sec: 1.0

# 可选跟踪器: ByteTrack 两阶段关联（适合多人密集、频繁遮挡）
# tracker:
#   type: "byte"
#   params:
#     iou_threshold: 0.3
#     high_threshold: 0.5
#     low_threshold: 0.1
#     max_missed_sec: 0.5
#     recognize_interval_sec: 1.0

# 文件夹路径默认值
known_faces_dir: "known_faces"
images_dir: "images"
